name: CI-CD

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy on Kubernetes after image publish"
        required: true
        default: false
        type: boolean

jobs:
  ci:
    name: CI - Build and API tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build and start stack (Docker Compose)
        run: docker compose up --build -d

      - name: Wait for API readiness
        run: |
          for i in {1..40}; do
            if curl -sf http://localhost:5000/health > /dev/null; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/40)"
            sleep 3
          done
          echo "API did not become ready in time"
          exit 1

      - name: Run functional API tests
        shell: pwsh
        run: ./test-api.ps1 -BaseUrl http://localhost:5000

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Shutdown stack
        if: always()
        run: docker compose down -v

  publish:
    name: CD - Build and publish image
    needs: ci
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/taskfleet-ops-backend
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: CD - Deploy to Kubernetes (manual)
    needs: publish
    if: github.event_name == 'workflow_dispatch' && inputs.deploy == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate kubeconfig secret
        env:
          KUBE_CONFIG_BASE64: ${{ secrets.KUBE_CONFIG_BASE64 }}
        run: |
          if [ -z "$KUBE_CONFIG_BASE64" ]; then
            echo "KUBE_CONFIG_BASE64 secret is missing. Add it in GitHub repository secrets."
            exit 1
          fi

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_BASE64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Apply manifests
        run: kubectl apply -f k8s/

      - name: Update backend image to current SHA
        run: |
          kubectl set image deployment/todo-backend \
            backend=ghcr.io/${{ github.repository_owner }}/taskfleet-ops-backend:sha-${{ github.sha }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/todo-backend --timeout=180s

      - name: Show deployed resources
        run: |
          kubectl get pods
          kubectl get services
          kubectl get ingress
          kubectl get hpa
