apiVersion: v1
kind: Secret
metadata:
  name: todo-secrets
  labels:
    app: todo-api
type: Opaque
stringData:
  # Tous les credentials DB sont regroupés ici.
  # En production : utiliser un gestionnaire de secrets externe
  # (HashiCorp Vault, AWS Secrets Manager, Sealed Secrets, etc.)
  # et ne jamais committer de vraies valeurs sensibles.
  DB_USER: postgres
  DB_PASSWORD: postgres
  POSTGRES_PASSWORD: postgres
